<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="720" viewBox="0 0 1000 720">
  <rect width="1000" height="720" fill="#faf8f3"/>
  <text x="40" y="44" font-family="Georgia,serif" font-size="24" font-weight="bold" fill="#222">Logo audit — structural patterns across the top 15</text>
  <text x="40" y="70" font-family="Helvetica,sans-serif" font-size="13" fill="#777">Simplified study marks (not actual brand logos) — analyzing shape type, motion &amp; geometry only</text>

  <!-- Row labels by category -->
  <text x="40" y="120" font-family="Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#444">MOTION GESTURES (single dynamic stroke)</text>

  <!-- Swoosh-type -->
  <g transform="translate(120,180)">
    <path d="M-70 10 Q 30 30 80 -40 Q 10 5 -70 -8 Z" fill="#222"/>
    <text x="0" y="55" text-anchor="middle" font-family="Helvetica,sans-serif" font-size="12" fill="#888">checkmark / speed</text>
  </g>
  <!-- spiral converge (asics-type) -->
  <g transform="translate(320,180)" stroke="#222" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M-50 -30 Q 0 -10 10 30"/><path d="M-35 -38 Q 20 -15 25 25"/>
    <path d="M-20 -44 Q 38 -18 42 18"/>
    <text x="0" y="58" text-anchor="middle" font-family="Helvetica,sans-serif" font-size="12" fill="#888" stroke="none">converging stripes</text>
  </g>
  <!-- wing (hoka/on-type) -->
  <g transform="translate(520,180)" stroke="#222" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M-55 -20 Q -10 -30 0 20"/><path d="M-15 -28 Q 30 -34 50 -2"/>
    <text x="0" y="58" text-anchor="middle" font-family="Helvetica,sans-serif" font-size="12" fill="#888" stroke="none">wing / lift</text>
  </g>

  <text x="40" y="280" font-family="Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#444">GEOMETRIC EMBLEMS (symmetric, contained)</text>
  <!-- three stripes -->
  <g transform="translate(120,340)">
    <rect x="-45" y="20" width="90" height="10" fill="#222"/>
    <rect x="-30" y="0" width="60" height="10" fill="#222"/>
    <rect x="-15" y="-20" width="30" height="10" fill="#222"/>
    <text x="0" y="58" text-anchor="middle" font-family="Helvetica,sans-serif" font-size="12" fill="#888">stripes / ascent</text>
  </g>
  <!-- star in circle -->
  <g transform="translate(320,335)">
    <circle r="40" fill="none" stroke="#222" stroke-width="5"/>
    <path d="M0 -22 L6 -7 L22 -7 L9 3 L14 19 L0 9 L-14 19 L-9 3 L-22 -7 L-6 -7 Z" fill="#222"/>
    <text x="0" y="62" text-anchor="middle" font-family="Helvetica,sans-serif" font-size="12" fill="#888">star badge</text>
  </g>
  <!-- delta/vector -->
  <g transform="translate(520,340)" stroke="#222" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M-45 25 L -10 -25 L 10 25 L 45 -25"/>
    <text x="0" y="56" text-anchor="middle" font-family="Helvetica,sans-serif" font-size="12" fill="#888" stroke="none">delta / vector</text>
  </g>

  <text x="40" y="440" font-family="Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#444">MONOGRAM LETTERFORMS</text>
  <!-- NB slant -->
  <g transform="translate(120,500)">
    <path d="M-40 25 L-40 -25 L-10 25 L-10 -25" stroke="#222" stroke-width="9" fill="none" stroke-linecap="round"/>
    <text x="0" y="56" text-anchor="middle" font-family="Helvetica,sans-serif" font-size="12" fill="#888">slanted N</text>
  </g>
  <!-- interlock UA -->
  <g transform="translate(320,500)" stroke="#222" stroke-width="8" fill="none">
    <path d="M-30 -25 Q -30 15 0 15 Q 30 15 30 -25" stroke-linecap="round"/>
    <path d="M0 25 L-22 -18 M0 25 L22 -18" stroke-linecap="round"/>
    <text x="0" y="56" text-anchor="middle" font-family="Helvetica,sans-serif" font-size="12" fill="#888" stroke="none">interlock U+A</text>
  </g>
  <!-- two-lobe On -->
  <g transform="translate(520,500)">
    <path d="M-35 0 a18 22 0 1 0 0.1 0 Z" fill="#222"/>
    <path d="M5 -20 L5 20 M5 -20 a20 20 0 0 1 20 35" stroke="#222" stroke-width="8" fill="none" stroke-linecap="round"/>
    <text x="0" y="56" text-anchor="middle" font-family="Helvetica,sans-serif" font-size="12" fill="#888">soft monogram</text>
  </g>

  <text x="40" y="600" font-family="Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#444">PICTORIAL MASCOTS</text>
  <!-- leaping cat -->
  <g transform="translate(120,650)">
    <path d="M-45 10 Q -20 -25 10 -28 Q 35 -30 45 -45 Q 40 -20 15 -10 Q -10 0 -30 18 Z" fill="#222"/>
    <text x="0" y="40" text-anchor="middle" font-family="Helvetica,sans-serif" font-size="12" fill="#888">leaping animal</text>
  </g>
  <!-- tree -->
  <g transform="translate(320,650)">
    <path d="M0 20 L0 -10 M0 -5 L-15 -18 M0 0 L15 -14" stroke="#222" stroke-width="4" fill="none"/>
    <circle cx="0" cy="-22" r="14" fill="#222"/>
    <text x="0" y="40" text-anchor="middle" font-family="Helvetica,sans-serif" font-size="12" fill="#888">tree / heritage</text>
  </g>
  <!-- croc head -->
  <g transform="translate(520,650)">
    <path d="M-40 0 Q -20 -18 20 -12 Q 45 -8 45 5 L 40 8 Q 0 12 -38 8 Z" fill="#222"/>
    <text x="0" y="40" text-anchor="middle" font-family="Helvetica,sans-serif" font-size="12" fill="#888">creature head</text>
  </g>

  <!-- right column insights -->
  <line x1="680" y1="100" x2="680" y2="690" stroke="#ddd"/>
  <text x="710" y="125" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#222">What wins</text>
  <text x="710" y="155" font-family="Helvetica,sans-serif" font-size="12.5" fill="#555">• 11 of 15 are a SINGLE</text>
  <text x="710" y="173" font-family="Helvetica,sans-serif" font-size="12.5" fill="#555">  unbroken shape</text>
  <text x="710" y="200" font-family="Helvetica,sans-serif" font-size="12.5" fill="#555">• Most read in ONE color,</text>
  <text x="710" y="218" font-family="Helvetica,sans-serif" font-size="12.5" fill="#555">  solid fill</text>
  <text x="710" y="245" font-family="Helvetica,sans-serif" font-size="12.5" fill="#555">• Motion marks (swoosh,</text>
  <text x="710" y="263" font-family="Helvetica,sans-serif" font-size="12.5" fill="#555">  wing) feel fastest</text>
  <text x="710" y="290" font-family="Helvetica,sans-serif" font-size="12.5" fill="#555">• All work as a tiny</text>
  <text x="710" y="308" font-family="Helvetica,sans-serif" font-size="12.5" fill="#555">  silhouette (heel/tongue)</text>
  <text x="710" y="335" font-family="Helvetica,sans-serif" font-size="12.5" fill="#555">• Asymmetry = energy;</text>
  <text x="710" y="353" font-family="Helvetica,sans-serif" font-size="12.5" fill="#555">  symmetry = heritage</text>
  <text x="710" y="385" font-family="Helvetica,sans-serif" font-size="12.5" fill="#555">• None rely on fine detail</text>
  <text x="710" y="403" font-family="Helvetica,sans-serif" font-size="12.5" fill="#555">  — all survive embossing</text>

  <text x="710" y="445" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#222">The gap to exploit</text>
  <text x="710" y="475" font-family="Helvetica,sans-serif" font-size="12.5" fill="#555">No major brand owns an</text>
  <text x="710" y="493" font-family="Helvetica,sans-serif" font-size="12.5" fill="#555">Indian/South-Asian visual</text>
  <text x="710" y="511" font-family="Helvetica,sans-serif" font-size="12.5" fill="#555">language. A single-stroke</text>
  <text x="710" y="529" font-family="Helvetica,sans-serif" font-size="12.5" fill="#555">motion mark rooted in that</text>
  <text x="710" y="547" font-family="Helvetica,sans-serif" font-size="12.5" fill="#555">heritage = open territory.</text>
</svg>
